<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>서채연 포트폴리오</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: #fff;
    border-bottom: 1px solid #e5e5e7;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 {
    font-size: 17px;
    margin: 0;
    font-weight: 600;
  }
  header a.download {
    text-decoration: none;
    background: #0071e3;
    color: #fff;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
  }
  header a.download:hover { background: #0077ed; }
  .viewer-wrap {
    display: flex;
    justify-content: center;
    padding: 24px 12px;
  }
  iframe {
    width: 100%;
    max-width: 900px;
    height: calc(100vh - 110px);
    border: 1px solid #d2d2d7;
    border-radius: 10px;
    background: #fff;
  }
  .fallback {
    display: none;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px;
    text-align: center;
  }
  @media (max-width: 600px) {
    header h1 { font-size: 15px; }
  }
</style>
</head>
<body>
  <header>
    <h1>서채연 포트폴리오</h1>
    <a class="download" href="portfolio.pdf" download>PDF 다운로드</a>
  </header>
  <div class="viewer-wrap">
    <iframe src="portfolio.pdf" title="서채연 포트폴리오"></iframe>
  </div>
</body>
</html>
